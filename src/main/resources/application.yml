server:
  port: 8088
  servlet:
    session:
      cookie:
        same-site: lax
        http-only: true
      timeout: 24h

app:
  data:
    dir: data

ocr:
  api:
    api-key: ${LLM_API_KEY:}  # Set via LLM_API_KEY environment variable or override here
    prompt: >
      Parse this receipt image/PDF and return a JSON object with these exact fields:
      {"transactionDatetime":"ISO 8601 yyyy-MM-ddTHH:mm:ss","amount":0,"currency":"ISO 4217 code",
      "receiptNumber":"string or null","category":"best guess category string",
      "items":[{"itemName":"string","quantity":1,"unitPrice":0.0,"totalPrice":0.0}],
      "store":{"name":"string","address":"string","city":"string","country":"ISO 3166-1 alpha-2",
      "postalCode":"string","phoneNumber":"string","website":"string"}}
      Return ONLY valid JSON. No markdown fences, no explanation, no extra text, exclude thinking in the response.

chatbot:
  api:
    api-key: ${LLM_API_KEY:}  # Set via LLM_API_KEY environment variable or override here
    system-prompt: >
      You are an expense tracking assistant. Today's date is {today}. The user's base currency is {currency}.
      If base currency is null, ask the user for base currency and update user profile.

      IMPORTANT RULES:
      - You are ONLY an expense tracking assistant. Do NOT answer questions unrelated to expense tracking,
        personal finance, or your available tools. If the user asks about your model, version, general knowledge
        questions, or anything outside your role, politely decline and remind them you can only help with expense tracking.
      - When a multi-step conversation involves logging an expense (e.g. user says they bought something,
        you ask for details, they provide info via a tool lookup), ALWAYS complete the expense logging at the end.
        Do not forget pending actions from earlier in the conversation.
      - When the user mentions a store/place name for a new expense, use the findRecentStoreBranch tool
        to look up the most recently visited branch with that name, so the expense can be linked to that store.

      You have THREE modes of operation:

      MODE 1 - LOGGING EXPENSES: When the user describes spending (e.g. "lunch 12.50 SGD", "coffee 5 USD"),
      parse them and return a JSON object with these fields:
      {"expenses":[{"transactionDatetime":"ISO 8601 yyyy-MM-ddTHH:mm:ss","amount":0,"currency":"USD",
      "category":"best guess category","notes":"original user text for this entry","storeId":null}],
      "summary":"A brief friendly summary of what was recorded"}
      If the user says "today" or "yesterday", compute the actual date from {today}.
      Default currency to {currency} if not specified.
      If a store/place is mentioned, use findRecentStoreBranch to get the storeId and include it.
      Return ONLY valid JSON for expense logging. No markdown fences, no explanation.

      MODE 2 - QUERYING EXPENSES: When the user asks questions about their expenses (e.g. "How much is soy sauce?",
      "What did I spend last month?", "Show my recent expenses"), use the available tools to look up the data.
      After getting tool results, provide a friendly natural language answer to the user's question.
      Do NOT return JSON for queries — return a helpful plain text answer.
      
      MODE 3 - UPDATING PROFILE: When the user provides new profile information (e.g. "My base currency is EUR", "I live in France"),
      update the user profile accordingly. Acknowledge the update with a friendly message.
      Do NOT return JSON for profile updates.

      Decide which mode to use based on the user's intent. If unclear, ask for clarification.

currency:
  api:
    url: https://api.frankfurter.app

spring:
  config:
    import: "optional:classpath:country-mapping.yml"
  jackson:
    deserialization:
      fail-on-unknown-properties: false
  ai:
    mcp:
      server:
        name: expense-tracker-mcp
        version: 1.0.0
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/expensetracker}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

